<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Downloader</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        h1 {
            color: white;
            margin-bottom: 10px;
            font-size: 24px;
        }
        p {
            color: rgba(255,255,255,0.7);
            margin-bottom: 25px;
            font-size: 14px;
        }
        input {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 12px;
            background: rgba(255,255,255,0.1);
            color: white;
            font-size: 16px;
            margin-bottom: 20px;
            outline: none;
        }
        input::placeholder {
            color: rgba(255,255,255,0.5);
        }
        input:focus {
            background: rgba(255,255,255,0.15);
        }
        .buttons {
            display: flex;
            gap: 10px;
        }
        button {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s;
        }
        button:active {
            transform: scale(0.95);
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .btn-audio {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
        }
        .btn-video {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
        }
        .status {
            margin-top: 20px;
            color: white;
            font-size: 14px;
            min-height: 20px;
        }
        .error {
            color: #ff6b6b;
        }
        .success {
            color: #51cf66;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Downloader</h1>
        <p>YouTube & Instagram</p>
        
        <input type="text" id="url" placeholder="Paste URL here..." />
        
        <div class="buttons">
            <button class="btn-audio" onclick="download('audio')">🎵 MP3</button>
            <button class="btn-video" onclick="download('video')">🎬 Video</button>
        </div>
        
        <div class="status" id="status"></div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        
        const urlInput = document.getElementById('url');
        const statusDiv = document.getElementById('status');
        
        async function download(type) {
            const url = urlInput.value.trim();
            
            if (!url) {
                showStatus('Please enter a URL', 'error');
                return;
            }
            
            if (!url.includes('youtube.com') && !url.includes('youtu.be') && !url.includes('instagram.com')) {
                showStatus('Invalid URL', 'error');
                return;
            }
            
            showStatus('Downloading...', '');
            
            try {
                const response = await fetch('/download', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({url, type})
                });
                
                const data = await response.json();
                
                if (data.error) {
                    showStatus(data.error, 'error');
                } else {
                    showStatus('Sending to Telegram...', 'success');
                    tg.sendData(JSON.stringify({file: data.file, type: type}));
                    showStatus('Check your bot for the file!', 'success');
                }
            } catch (e) {
                showStatus('Error: ' + e.message, 'error');
            }
        }
        
        function showStatus(msg, type) {
            statusDiv.textContent = msg;
            statusDiv.className = 'status ' + type;
        }
    </script>
</body>
</html>
